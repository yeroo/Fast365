name: build-binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write       # create release + upload assets
      id-token: write        # keyless provenance + cosign signing
      attestations: write    # build-provenance attestation
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Stage binary + checksum
        shell: bash
        run: |
          mkdir -p dist
          cp "build/Release/fast365.exe" "dist/fast365-windows-x86_64.exe"
          cd dist
          sha256sum fast365-windows-x86_64.exe > fast365-windows-x86_64.exe.sha256
          cat fast365-windows-x86_64.exe.sha256

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/fast365-windows-x86_64.exe

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact (keyless)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --yes \
            --output-signature dist/fast365-windows-x86_64.exe.sig \
            --output-certificate dist/fast365-windows-x86_64.exe.pem \
            dist/fast365-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fast365-windows-x86_64
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fast365-windows-x86_64.exe
            dist/fast365-windows-x86_64.exe.sha256
            dist/fast365-windows-x86_64.exe.sig
            dist/fast365-windows-x86_64.exe.pem
